name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you re-running CI manually? (optional)"
        required: false
        default: "Manual CI run"

permissions:
  contents: read
  statuses: write

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  deploy:
    name: Deploy to Replit Production
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Mark production deploy pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "pending",
              context: "replit/production",
              description: "Production deployment is starting",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Trigger Replit production deployment
        env:
          REPLIT_DEPLOY_WEBHOOK: ${{ secrets.REPLIT_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$REPLIT_DEPLOY_WEBHOOK" ]; then
            echo "REPLIT_DEPLOY_WEBHOOK GitHub Actions secret is not configured" >&2
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data "{\"ref\":\"${GITHUB_REF_NAME}\",\"sha\":\"${GITHUB_SHA}\",\"environment\":\"production\"}" \
            "$REPLIT_DEPLOY_WEBHOOK"

      - name: Mark production deploy success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "replit/production",
              description: "Production deployment succeeded",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark production deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "failure",
              context: "replit/production",
              description: "Production deployment failed",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
