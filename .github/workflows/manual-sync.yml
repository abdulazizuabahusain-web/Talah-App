name: Manual Sync Check

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this? (e.g. 'retrying after sync failure')"
        required: false
        default: "Manual re-sync check"
      ref:
        description: "Branch or commit SHA to push to main (default: current main tip)"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  sync-push:
    name: Re-sync to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Print sync info
        run: |
          echo "=================================================="
          echo "  Manual sync push"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Reason       : ${{ inputs.reason }}"
          echo "  Source ref   : ${{ inputs.ref }}"
          echo "  Commit SHA   : $(git rev-parse HEAD)"
          echo "  Commit msg   : $(git log -1 --pretty=%s)"
          echo "  Author       : $(git log -1 --pretty=%an)"
          echo "  Date         : $(git log -1 --pretty=%ad --date=iso)"
          echo "=================================================="

      - name: Push to main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          CURRENT_SHA=$(git rev-parse HEAD)
          if git push origin HEAD:main; then
            echo ""
            echo "Push succeeded — main is now at ${CURRENT_SHA}"
          else
            echo ""
            echo "ERROR: push was rejected."
            echo "Possible reasons:"
            echo "  - The source ref is not a fast-forward from current main"
            echo "    (use 'git push --force' locally if you are the repo owner)"
            echo "  - The commit does not yet have a passing CI run"
            echo "    (wait for CI to complete on the source branch first)"
            echo "  - A branch ruleset is blocking the push"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Done
        run: |
          echo "=================================================="
          echo "  Sync check PASSED"
          echo "  main is now at : $(git rev-parse HEAD)"
          echo "  Code quality   : typecheck passed"
          echo "=================================================="
