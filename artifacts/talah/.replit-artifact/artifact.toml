kind = "mobile"
previewPath = "/"
title = "Tal'ah"
version = "1.0.0"
id = "artifacts/talah"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20433

[services.development]
run = "pnpm --filter @workspace/talah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talah", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/talah", "run", "serve" ]

[services.env]
PORT = "20433"
BASE_PATH = "/"
